<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Security Awareness Training</title>
  <link rel="icon" href="logo.png">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f6f9;
    }

    .container {
      max-width: 420px;
      margin: 80px auto;
      background: white;
      padding: 35px;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      text-align: center;
    }

    .logo {
      width: 90px;
      margin-bottom: 15px;
    }

    h2 {
      font-size: 20px;
      margin-bottom: 10px;
      color: #1f2937;
    }

    p {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 25px;
      line-height: 1.4;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #1d4ed8;
    }

    .note {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 15px;
    }
  </style>
</head>

<body>

<div class="container">

  <img src="logo.png" class="logo">

  <h2>Security Awareness Training</h2>

  <p>
    W ramach szkolenia sprawdź swoją umiejętność rozpoznawania zagrożeń phishingowych.
  </p>

  <input placeholder="Login (test)" />
  <input type="password" placeholder="Hasło (test)" />

  <button onclick="location.href='thankyou.html'">
    Rozpocznij test
  </button>

  <div class="note">
    To jest środowisko szkoleniowe – żadne dane nie są zapisywane.
  </div>

</div>

</body>
</html>
