<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Security Awareness Training</title>
  <link rel="icon" href="logo.png">

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      width: 420px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 30px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }

    .logo {
      width: 80px;
      margin-bottom: 15px;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 10px;
    }

    p {
      font-size: 14px;
      color: #cbd5e1;
      margin-bottom: 25px;
      line-height: 1.5;
    }

    .input {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border: none;
      border-radius: 8px;
      outline: none;
      background: rgba(255,255,255,0.08);
      color: white;
    }

    .btn {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: #3b82f6;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn:hover {
      background: #2563eb;
      transform: translateY(-1px);
    }

    .note {
      margin-top: 15px;
      font-size: 12px;
      color: #94a3b8;
    }

    .badge {
      display: inline-block;
      background: rgba(59,130,246,0.2);
      color: #60a5fa;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 11px;
      margin-bottom: 15px;
    }
  </style>
</head>

<body>

<div class="card">

  <img src="logo.png" class="logo">

  <div class="badge">Security Awareness Training</div>

  <h1>Cyber Security Check</h1>

  <p>
    Sprawdź swoją odporność na ataki phishingowe w krótkim, 2-minutowym szkoleniu.
  </p>

  <input class="input" placeholder="Login (test)" />
  <input class="input" type="password" placeholder="Hasło (test)" />

  <button class="btn" onclick="location.href='thankyou.html'">
    Rozpocznij test
  </button>

  <div class="note">
    ℹ️ To środowisko szkoleniowe — dane nie są zapisywane
  </div>

</div>

</body>
</html>
